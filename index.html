<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Desire and the Daemon</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background-color: #111;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-weight: normal;
      font-size: 2rem;
      margin-bottom: 2rem;
    }

    .container:hover .hidden {

      margin-top: 2rem;
      color: #f5f5f5;
      text-decoration: none;
      border-bottom: 1px solid #f5f5f5;

      opacity: 0.6;
    }

</head>

<body>
  <div class="container">
    <h1>
      Necessary. Disposable.  
      Expert. Imposter.
    </h1>

    <p>

    <p class="hidden">

    </p>
